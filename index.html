<style>
  :root {
    --bg: #0A0A0A;          /* Jet black obsidian background */
    --card: #121212;        /* Subtle dark gray cards */
    --card2: #1A1A1A;
    --cyan: #39FF14;        /* Pure Matrix Neon Green */
    --purple: #1F8A0D;      /* Darker Forest Green accent */
    --white: #FFFFFF;
    --silver: #8E9296;      /* Dimmed text to emphasize the green neon */
    --border: rgba(57, 255, 20, 0.15); /* Matrix green borders */
    --glow-cyan: rgba(57, 255, 20, 0.2);
    --glow-purple: rgba(31, 138, 13, 0.1);
    --gradient: linear-gradient(135deg, var(--cyan), var(--purple));
    --gradient-text: linear-gradient(135deg, #39FF14 0%, #FFFFFF 100%);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'JetBrains Mono', monospace; /* Rigid technical alignment */
    overflow-x: hidden;
    cursor: none;
  }

  /* ─── CUSTOM CURSOR ─── */
  .cursor-dot {
    width: 6px; height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    transition: transform 0.05s;
    box-shadow: 0 0 8px var(--cyan);
  }
  .cursor-ring {
    width: 28px; height: 28px;
    border: 1px solid var(--cyan);
    border-radius: 0px; /* Monochromatic target indicator grid style box instead of circle */
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%,-50%);
    transition: all 0.08s ease;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--cyan); }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 5%;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10, 10, 10, 0.9);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s;
  }
  nav.scrolled {
    background: rgba(10, 10, 10, 0.98);
    box-shadow: 0 4px 30px rgba(0,0,0,0.8);
  }
  .nav-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--cyan);
    text-shadow: 0 0 5px var(--cyan);
  }
  .nav-links {
    display: flex; gap: 2rem; list-style: none;
  }
  .nav-links a {
    color: var(--silver);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    transition: color 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute; bottom: -4px; left: 0; right: 0; height: 1px;
    background: var(--cyan);
    transform: scaleX(0);
    transition: transform 0.3s;
  }
  .nav-links a:hover { color: var(--cyan); text-shadow: 0 0 5px var(--cyan); }
  .nav-links a:hover::after { transform: scaleX(1); }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
  .hamburger span { width: 24px; height: 2px; background: var(--white); transition: all 0.3s; display: block; }
